# WebSocket Connection 头映射：HTTP 请求保持 close，WS 请求升级为 keep-alive
# 不能直接写死 "upgrade"，否则普通 HTTP 请求也会被强制升级
# conf.d/*.conf 被 nginx.conf 的 http {} 块 include，因此 map/server 可并列在此声明
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/javascript application/json;

    # /api/ 反向代理到 api-gateway
    # 关键：proxy_http_version 1.1 + Upgrade/Connection 头，否则 ws_handler.go 的 WS 升级会失败
    # 关键：proxy_read_timeout 300s，覆盖 AI 诊断（DeepSeek 调用最多 120s）+ node-agent WS 长连接
    # 关键：proxy_buffering off，避免流式响应被 Nginx 缓冲导致前端等到超时
    location /api/ {
        proxy_pass http://api-gateway:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout  10s;
        proxy_send_timeout     300s;
        proxy_read_timeout     300s;
        proxy_buffering        off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
