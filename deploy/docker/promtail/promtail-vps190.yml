# Promtail - VPS190 生产配置
# 采集 yundu-* 容器日志 + xboard 容器日志
server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    backoff_config:
      min_period: 500ms
      max_period: 5m
      max_retries: 10

scrape_configs:
  # ===== YunDu 基础设施容器（yundu-*）=====
  - job_name: yundu-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: name
            values: ["yundu-"]
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'
      - source_labels: ['__meta_docker_container_log_streaming']
        target_label: 'stream'
    pipeline_stages:
      # 解析 Go slog JSON 日志
      - json:
          expressions:
            level: level
            msg: msg
            time: time
            service: service
            trace_id: trace_id
            span_id: span_id
          source: null
      - labels:
          level:
          service:
      - structured_metadata:
          trace_id:
          span_id:

  # ===== YunDu Go 微服务 systemd 日志 =====
  # Go 微服务是 systemd 部署，日志在 /opt/yundu/logs/
  - job_name: yundu-systemd-logs
    static_configs:
      - targets: [localhost]
        labels:
          job: yundu-systemd
          __path__: /var/log/yundu/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            msg: msg
            time: time
            service: service
            trace_id: trace_id
            span_id: span_id
      - labels:
          level:
          service:

limits_config:
  readline_rate_enabled: true
  readline_rate: 5000
  readline_burst: 5000
