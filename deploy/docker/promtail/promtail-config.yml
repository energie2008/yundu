# Promtail — 采集容器日志（Docker socket）发送到 Loki
server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/positions.yaml

# 通过 Docker socket 自动发现所有容器日志
clients:
  - url: http://loki:3100/loki/api/v1/push
    backoff_config:
      min_period: 500ms
      max_period: 5m
      max_retries: 10

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: ["com.docker.compose.project=airport"]
    relabel_configs:
      # 仅采集本项目的容器（project label 已经过滤）
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'service'
      - source_labels: ['__meta_docker_container_log_streaming']
        target_label: 'stream'
    pipeline_stages:
      # 解析常见 Go slog JSON 日志
      - json:
          expressions:
            level: level
            msg: msg
            time: time
            service: service
            trace_id: trace_id
            span_id: span_id
          source: null
      - labels:
          level:
          service:
      # 关联 OTel trace_id（若存在）
      - structured_metadata:
          trace_id:
          span_id:

limits_config:
  readline_rate_enabled: true
  readline_rate: 10000
  readline_burst: 10000
