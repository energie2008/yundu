# Prometheus 抓取配置 - VPS190 生产
# Go 微服务是 systemd 裸金属部署，监听 127.0.0.1:8081-8090
# 通过 host.docker.internal 从容器内访问宿主机服务
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'yundu-vps190'

scrape_configs:
  # ===== YunDu Go 微服务（宿主机 systemd 部署）=====
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['host.docker.internal:8090']
        labels:
          service: 'api-gateway'
    metrics_path: /metrics

  - job_name: 'identity-service'
    static_configs:
      - targets: ['host.docker.internal:8081']
        labels:
          service: 'identity-service'
    metrics_path: /metrics

  - job_name: 'node-service'
    static_configs:
      - targets: ['host.docker.internal:8082']
        labels:
          service: 'node-service'
    metrics_path: /metrics

  - job_name: 'subscription-service'
    static_configs:
      - targets: ['host.docker.internal:8083']
        labels:
          service: 'subscription-service'
    metrics_path: /metrics

  - job_name: 'traffic-service'
    static_configs:
      - targets: ['host.docker.internal:8084']
        labels:
          service: 'traffic-service'
    metrics_path: /metrics

  # ===== 基础设施容器（Docker 内部）=====
  - job_name: 'yundu-postgres'
    static_configs:
      - targets: ['host.docker.internal:5433']
        labels:
          service: 'postgres'
    metrics_path: /metrics

  # ===== 容器自身指标 =====
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'loki'
    static_configs:
      - targets: ['loki:3100']
        labels:
          service: 'loki'
    metrics_path: /metrics

  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8888']
        labels:
          service: 'otel-collector'
    metrics_path: /metrics

  # ===== 宿主机节点指标（可选，需部署 node-exporter）=====
  # 如需启用，先运行：docker run -d --name yundu-node-exporter --net=host prom/node-exporter
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['host.docker.internal:9100']
        labels:
          service: 'node'
    metrics_path: /metrics
